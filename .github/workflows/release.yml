name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npx electron-builder --win --publish never
          - os: macos-latest
            cmd: npx electron-builder --mac --publish never
          - os: ubuntu-latest
            cmd: npx electron-builder --linux --publish never

    runs-on: ${{ matrix.os }}

    env:
      # No Windows / Apple code-signing certificates — unsigned installers for all platforms
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (${{ matrix.os }})
        run: ${{ matrix.cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
