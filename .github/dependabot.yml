version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      electron:
        patterns:
          - electron
          - electron-*
      dev-tooling:
        patterns:
          - eslint
          - '@eslint/*'
          - prettier
          - globals
          - jest
          - cross-env

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
