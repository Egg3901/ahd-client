<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-top: #222238;
        --bg-bottom: #12121f;
        --border: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(201, 169, 89, 0.22);
        --gold: #c9a959;
        --dim: #8b8bb8;
        --text: #e8e8f0;
        --green: #5cbf63;
        --amber: #ffb04a;
        --red: #f05a5a;
        --radius-shell: 14px;
        --radius-card: 10px;
        --radius-sm: 6px;
        --shadow-shell:
          0 12px 40px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(201, 169, 89, 0.07) inset;
      }
      html {
        background: transparent;
        height: 100%;
        overflow: hidden;
      }
      body {
        height: 100%;
        margin: 0;
        background: transparent;
        color: var(--text);
        font-family: 'Segoe UI', 'SF Pro Text', system-ui, sans-serif;
        font-size: 11px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        user-select: none;
        cursor: default;
      }
      .pip-root {
        container-type: inline-size;
        container-name: piproot;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 8px 10px 6px;
        border-radius: var(--radius-shell);
        border: 1px solid var(--border);
        background: linear-gradient(
          165deg,
          var(--bg-top) 0%,
          var(--bg-bottom) 100%
        );
        box-shadow: var(--shadow-shell);
        overflow: hidden;
      }
      .pip-titlebar {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        -webkit-app-region: drag;
        margin-bottom: 6px;
      }
      .pip-title {
        font-size: 9px;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-weight: 600;
      }
      .pip-title-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .pip-titlebar-btns {
        display: flex;
        gap: 2px;
        -webkit-app-region: no-drag;
      }
      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 26px;
        height: 26px;
        padding: 0 6px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-sm);
        color: var(--dim);
        cursor: pointer;
        font-size: 11px;
        line-height: 1;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }
      .icon-btn:hover {
        background: rgba(201, 169, 89, 0.12);
        border-color: rgba(201, 169, 89, 0.25);
        color: var(--gold);
      }
      .icon-btn.close:hover {
        background: rgba(240, 90, 90, 0.15);
        color: var(--red);
      }
      .pip-bar {
        display: grid;
        gap: 4px;
        padding: 6px;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: var(--radius-card);
        margin-bottom: 6px;
        flex-shrink: 0;
      }
      @container piproot (min-width: 400px) {
        .pip-bar {
          grid-template-columns: repeat(var(--bar-cols, 8), minmax(0, 1fr));
          grid-template-rows: auto;
        }
      }
      @container piproot (max-width: 399px) {
        .pip-bar {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          grid-template-rows: auto auto;
        }
      }
      .pip-stat {
        text-align: center;
        padding: 3px 2px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        min-width: 0;
      }
      .pip-stat:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .pip-stat-val {
        font-size: 12px;
        font-weight: 700;
        color: var(--gold);
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pip-stat-val.warn {
        color: var(--amber);
      }
      .pip-stat-val.danger {
        color: var(--red);
      }
      .pip-stat-lab {
        font-size: 7px;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 1px;
      }
      .pip-body {
        flex: 1;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-app-region: no-drag;
        padding-right: 2px;
      }
      @container piproot (min-width: 560px) {
        .pip-custom-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        }
      }
      @container piproot (min-width: 400px) {
        .pip-view-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }
      }
      .pip-view-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .pip-panel {
        background: rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-card);
        padding: 8px;
      }
      .pip-panel h3 {
        font-size: 8px;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 6px;
        font-weight: 600;
      }
      .pip-muted {
        color: var(--dim);
        font-size: 10px;
      }
      .pip-skel {
        height: 10px;
        border-radius: 4px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.09),
          rgba(255, 255, 255, 0.04)
        );
        background-size: 200% 100%;
        animation: sk 1.1s ease-in-out infinite;
        margin-bottom: 6px;
      }
      @keyframes sk {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }
      .pip-footer {
        flex-shrink: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 6px;
        font-size: 9px;
        color: rgba(139, 139, 184, 0.75);
        -webkit-app-region: no-drag;
      }
      .pip-footer a,
      .pip-footer button.link {
        background: none;
        border: none;
        color: var(--gold);
        cursor: pointer;
        font: inherit;
        text-decoration: underline;
        padding: 0;
      }
      .pip-footer a:hover,
      .pip-footer button.link:hover {
        color: #e0c978;
      }
      .pip-stale {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 9px;
        color: var(--amber);
      }
      .pip-stale[hidden] {
        display: none;
      }
      .pip-badge {
        display: inline-block;
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 999px;
        background: rgba(92, 191, 99, 0.12);
        border: 1px solid rgba(92, 191, 99, 0.35);
        color: var(--green);
        margin: 2px 4px 2px 0;
      }
      .pip-badge.warn {
        background: rgba(255, 122, 69, 0.12);
        border-color: rgba(255, 122, 69, 0.35);
        color: #ff7a45;
      }
      .pip-list {
        font-size: 10px;
        line-height: 1.35;
        color: var(--text);
      }
      .pip-list li {
        margin-bottom: 4px;
        list-style: none;
      }
      .pip-table {
        width: 100%;
        font-size: 9px;
        border-collapse: collapse;
      }
      .pip-table th,
      .pip-table td {
        padding: 3px 4px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .pip-custom-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .pip-custom-tile {
        position: relative;
        min-height: 48px;
      }
      .pip-custom-tile.edit {
        outline: 1px dashed rgba(201, 169, 89, 0.35);
      }
      .pip-drag {
        position: absolute;
        top: 4px;
        left: 4px;
        cursor: grab;
        color: var(--dim);
        font-size: 12px;
      }
      .pip-rm {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 20px;
        height: 20px;
        border: none;
        background: rgba(240, 90, 90, 0.15);
        color: var(--red);
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }
      .pip-add-slot {
        border: 1px dashed rgba(255, 255, 255, 0.15);
        border-radius: var(--radius-card);
        padding: 12px;
        text-align: center;
        color: var(--dim);
        cursor: pointer;
        font-size: 10px;
      }
      .pip-add-slot:hover {
        border-color: rgba(201, 169, 89, 0.35);
        color: var(--gold);
      }
      .pip-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 12px;
      }
      .pip-overlay.open {
        display: flex;
      }
      .pip-overlay-inner {
        background: var(--bg-top);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-card);
        max-height: 80%;
        overflow: auto;
        padding: 10px;
        min-width: 200px;
      }
      .pip-overlay-inner button.row {
        display: block;
        width: 100%;
        text-align: left;
        padding: 8px;
        margin-bottom: 4px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
      }
      .pip-overlay-inner button.row:hover {
        background: rgba(201, 169, 89, 0.12);
      }
      .pip-country-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .pip-country-cell {
        padding: 6px;
        border-radius: var(--radius-sm);
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 9px;
      }
      .pip-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
      }
      .no-drag,
      button {
        -webkit-app-region: no-drag;
      }
      .pip-click {
        cursor: pointer;
        border-radius: var(--radius-sm);
      }
      .pip-click:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .pip-feed-row {
        padding: 5px 4px;
        margin: 0 -4px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        cursor: pointer;
        list-style: none;
      }
      .pip-feed-row:last-child {
        border-bottom: none;
      }
      .pip-feed-row:hover {
        color: var(--gold);
      }
      .pip-pct {
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }
      .pip-pct.up {
        color: var(--green);
      }
      .pip-pct.down {
        color: var(--red);
      }
      .pip-turn-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(201, 169, 89, 0.15);
        border: 1px solid rgba(201, 169, 89, 0.35);
        color: var(--gold);
        font-weight: 700;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div class="pip-root" id="pip-root">
      <div class="pip-titlebar">
        <span class="pip-title-wrap">
          <span class="pip-title">A House Divided</span>
          <span class="pip-stale" id="pip-stale-badge" hidden>● stale</span>
        </span>
        <div class="pip-titlebar-btns">
          <button
            type="button"
            class="icon-btn"
            id="btn-view-cycle"
            title="Cycle view"
          >
            Standard ▸
          </button>
          <button
            type="button"
            class="icon-btn"
            onclick="openMain()"
            title="Open full app"
          >
            ⊞
          </button>
          <button
            type="button"
            class="icon-btn close"
            onclick="window.close()"
            title="Close"
          >
            ×
          </button>
        </div>
      </div>

      <div class="pip-bar" id="pip-bar" style="--bar-cols: 8"></div>

      <div class="pip-body" id="pip-body"></div>

      <div class="pip-footer" id="pip-footer">
        <button type="button" class="link" id="link-bar-config">
          ✦ customize bar
        </button>
        <button type="button" class="link" id="link-edit-custom" hidden>
          edit layout
        </button>
        <span class="pip-stale" id="pip-stale-footer" hidden>● data stale</span>
      </div>
    </div>

    <div class="pip-overlay" id="pip-picker">
      <div class="pip-overlay-inner">
        <div
          style="
            font-size: 10px;
            color: var(--dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
          "
        >
          Add panel
        </div>
        <div id="pip-picker-list"></div>
        <button
          type="button"
          class="row"
          style="margin-top: 8px"
          id="pip-picker-close"
        >
          Cancel
        </button>
      </div>
    </div>

    <script src="pip-labels.js"></script>
    <script src="format-compact-number.js"></script>
    <script>
      const VIEW_LABELS = {
        standard: 'Standard',
        corp: 'Corp',
        elections: 'Elections',
        global: 'Global',
        custom: 'Custom',
      };

      const PANEL_LABELS = {
        'my-status': 'My Status',
        'my-election': 'My Race',
        'decay-stats': 'Decay Stats',
        'income-breakdown': 'Income',
        notifications: 'Notifications',
        legislature: 'Legislature',
        'elections-feed': 'Elections Feed',
        'my-corp': 'My Corp',
        commodities: 'Commodities',
        'top-corps': 'Top Corps',
        'country-snapshot': 'Countries',
        crises: 'Crises',
        'mail-count': 'Mail',
        'portfolio-value': 'Portfolio',
      };

      const BAR_LABELS = {
        ap: 'AP',
        funds: 'Funds',
        cash: 'Cash',
        portfolio: 'Port',
        pi: 'PI',
        fav: 'FAV',
        infamy: 'Infamy',
        nationalInfluence: 'Natl PI',
        turn: 'Turn',
      };

      let bar = {};
      let views = {
        standard: null,
        corp: null,
        elections: null,
        global: null,
        custom: null,
      };
      let activeView = 'standard';
      let lastUpdate = Date.now();
      let barStats = [
        'ap',
        'funds',
        'cash',
        'portfolio',
        'pi',
        'fav',
        'nationalInfluence',
        'turn',
      ];
      let customPanels = [
        'my-status',
        'my-election',
        'notifications',
        'legislature',
      ];
      let customEdit = false;

      function rnd(n) {
        if (n == null || Number.isNaN(Number(n))) return null;
        return Math.round(Number(n));
      }

      function fmtMoney(n) {
        return formatMoneyCompact(n);
      }

      function fmtStat(n) {
        const r = rnd(n);
        return r == null ? '—' : String(r);
      }

      function barValue(key) {
        switch (key) {
          case 'ap': {
            const ap = bar.actionPoints;
            const max = bar.maxActionPoints ?? 15;
            if (ap == null) return '—';
            return `${fmtStat(ap)}/${fmtStat(max)}`;
          }
          case 'funds':
            return bar.funds != null ? fmtMoney(bar.funds) : '—';
          case 'cash':
            return bar.cashOnHand != null ? fmtMoney(bar.cashOnHand) : '—';
          case 'portfolio':
            return bar.portfolioValue != null
              ? fmtMoney(bar.portfolioValue)
              : '—';
          case 'pi':
            return (
              fmtStat(bar.politicalInfluence) +
              (bar.politicalInfluenceDecayWarning ? ' ↓' : '')
            );
          case 'fav':
            return (
              fmtStat(bar.favorability) +
              (bar.favorabilityDecayWarning ? ' ↓' : '')
            );
          case 'infamy':
            return fmtStat(bar.infamy ?? 0);
          case 'nationalInfluence':
            return fmtStat(bar.nationalInfluence);
          case 'turn':
            return bar.nextTurnIn || '—';
          default:
            return '—';
        }
      }

      function barValueClass(key) {
        if (key === 'pi' && bar.politicalInfluenceDecayWarning) return 'warn';
        if (key === 'fav' && bar.favorabilityDecayWarning) return 'warn';
        if (key === 'infamy' && bar.infamyDecayWarning) return 'danger';
        return '';
      }

      function renderBar() {
        const el = document.getElementById('pip-bar');
        const keys = barStats.filter((k) => BAR_LABELS[k]);
        el.style.setProperty('--bar-cols', String(Math.max(keys.length, 1)));
        el.innerHTML = '';
        keys.forEach((k) => {
          const d = document.createElement('div');
          d.className = 'pip-stat';
          d.onclick = openMain;
          const valueCls = barValueClass(k);
          d.innerHTML =
            '<div class="pip-stat-val' +
            (valueCls ? ' ' + valueCls : '') +
            '">' +
            escapeHtml(barValue(k)) +
            '</div><div class="pip-stat-lab">' +
            escapeHtml(BAR_LABELS[k]) +
            '</div>';
          el.appendChild(d);
        });
      }

      function renderFreshness() {
        const stale = Date.now() - lastUpdate > 120000;
        document.getElementById('pip-stale-badge').hidden = !stale;
        document.getElementById('pip-stale-footer').hidden = !stale;
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function skel(n) {
        let h = '';
        for (let i = 0; i < n; i++) h += '<div class="pip-skel"></div>';
        return h;
      }

      function viewSkeleton() {
        return '<div class="pip-panel">' + skel(4) + '</div>';
      }

      function renderBody() {
        const root = document.getElementById('pip-body');
        const v = activeView;
        const loaded = views[v];
        const showSkel = loaded === null;

        document.getElementById('btn-view-cycle').textContent =
          (VIEW_LABELS[v] || v) + ' ▸';

        document.getElementById('link-edit-custom').hidden =
          v !== 'custom' || showSkel;

        if (showSkel) {
          root.innerHTML = viewSkeleton();
          return;
        }

        if (v === 'standard') root.innerHTML = renderStandard(views.standard);
        else if (v === 'corp') root.innerHTML = renderCorp(views.corp);
        else if (v === 'elections')
          root.innerHTML = renderElections(views.elections);
        else if (v === 'global') root.innerHTML = renderGlobal(views.global);
        else if (v === 'custom') {
          root.innerHTML = renderCustom();
          wireCustomView();
        }
      }

      function wireCustomView() {
        document.querySelectorAll('.pip-rm').forEach((b) => {
          b.onclick = () => removePanel(b.getAttribute('data-panel'));
        });
        const add = document.getElementById('pip-add-module');
        if (add) add.onclick = openPicker;
        let dragFrom = null;
        document.querySelectorAll('.pip-drag').forEach((h) => {
          h.ondragstart = (e) => {
            dragFrom = Number(h.getAttribute('data-idx'));
            e.dataTransfer.effectAllowed = 'move';
          };
        });
        document.querySelectorAll('.pip-custom-tile').forEach((tile, idx) => {
          tile.ondragover = (e) => e.preventDefault();
          tile.ondrop = (e) => {
            e.preventDefault();
            if (dragFrom == null || Number.isNaN(dragFrom)) return;
            const from = dragFrom;
            const to = idx;
            dragFrom = null;
            if (from === to) return;
            const next = customPanels.slice();
            const [m] = next.splice(from, 1);
            next.splice(to, 0, m);
            savePanels(next);
          };
        });
      }

      function legislatureSeatsHtml(rec) {
        if (!rec || typeof rec !== 'object') return '—';
        return Object.keys(rec)
          .map((k) => partyLabel(k) + ' ' + rec[k])
          .join(' · ');
      }

      function formatPctChange(pct) {
        if (pct == null || Number.isNaN(Number(pct))) return '—';
        const n = Number(pct);
        const cls = n >= 0 ? 'up' : 'down';
        const sign = n > 0 ? '+' : '';
        const t = Math.abs(n) >= 10 ? n.toFixed(0) : n.toFixed(1);
        return '<span class="pip-pct ' + cls + '">' + sign + t + '%</span>';
      }

      function decayBadge(key, x) {
        if (!x) return '';
        const lab =
          { pi: 'PI', fav: 'FAV', infamy: 'INF' }[key] ||
          String(key).toUpperCase();
        const cur = x.current;
        const proj = x.projected;
        let arrow = '→';
        if (proj != null && cur != null) {
          if (proj > cur) arrow = '↑';
          else if (proj < cur) arrow = '↓';
        }
        const warn = x.isDecaying ? ' warn' : '';
        return (
          '<span class="pip-badge' +
          warn +
          '">' +
          lab +
          ' ' +
          fmtStat(cur) +
          ' ' +
          arrow +
          ' ' +
          fmtStat(proj) +
          '</span>'
        );
      }

      function renderStandard(d) {
        d = d || {};
        const dec = d.decay || {};
        const inc = d.income || {};
        const n = d.notifications || {};
        let decayHtml = '';
        ['pi', 'fav', 'infamy'].forEach((k) => {
          const x = dec[k];
          if (!x) return;
          decayHtml += decayBadge(k, x);
        });
        const net =
          inc.netPerTurn != null ? fmtMoney(inc.netPerTurn) + ' / turn' : '—';
        let recent = '';
        (n.recent || []).forEach((r) => {
          recent +=
            '<li class="pip-feed-row pip-click" data-pip-route="/notifications">' +
            escapeHtml(r.message || r.type || '') +
            '</li>';
        });
        return (
          '<div class="pip-view-grid">' +
          '<div class="pip-panel"><h3>Decay (next turn)</h3>' +
          (decayHtml || '<p class="pip-muted">No data</p>') +
          '</div>' +
          '<div class="pip-panel"><h3>Income</h3><div class="pip-list">Net/turn: <strong style="color:var(--gold)">' +
          escapeHtml(net) +
          '</strong></div></div>' +
          '<div class="pip-panel"><h3>Notifications</h3>' +
          '<div class="pip-muted" style="margin-bottom:6px">Unread: ' +
          escapeHtml(String(n.unreadCount ?? '—')) +
          ' · Mail: ' +
          escapeHtml(String(n.unreadMailCount ?? '—')) +
          '</div>' +
          '<ul class="pip-list" style="padding:0">' +
          recent +
          '</ul></div></div>'
        );
      }

      function renderCorp(d) {
        d = d || {};
        const pc = d.playerCorp;
        let card =
          '<p class="pip-muted">No corporation (create one in the full app).</p>';
        if (pc) {
          const typeLab =
            pc.type != null
              ? corpTypeLabel(String(pc.type))
              : pc.sector != null
                ? corpTypeLabel(String(pc.sector))
                : '';
          const route =
            pc.id != null
              ? '/corporation/' + encodeURIComponent(String(pc.id))
              : '';
          const head =
            '<strong>' +
            escapeHtml(pc.name || '') +
            '</strong>' +
            (typeLab
              ? '<br/><span class="pip-muted">' +
                escapeHtml(typeLab) +
                '</span>'
              : '') +
            '<br/>Rev/turn ' +
            escapeHtml(fmtMoney(pc.revenuePerTurn)) +
            (pc.tier != null ? ' · Tier ' + escapeHtml(String(pc.tier)) : '') +
            '<br/>CEO actions: ' +
            escapeHtml(String(pc.ceoActionsRemaining ?? '—'));
          card = route
            ? '<div class="pip-list pip-click" data-pip-route="' +
              escapeHtml(route) +
              '">' +
              head +
              '</div>'
            : '<div class="pip-list">' + head + '</div>';
        }
        let rows = '';
        (d.commodities || []).forEach((c) => {
          const icon = commodityIcon(c.type);
          rows +=
            '<tr><td>' +
            icon +
            ' ' +
            escapeHtml(corpTypeLabel(String(c.type || ''))) +
            '</td><td>' +
            fmtMoney(c.price) +
            '</td><td>' +
            formatPctChange(c.change24h) +
            '</td></tr>';
        });
        let tops = '';
        (d.topCorps || []).forEach((t) => {
          const path =
            t.id != null
              ? '/corporation/' + encodeURIComponent(String(t.id))
              : '';
          const rowClick =
            path !== ''
              ? ' class="pip-click" data-pip-route="' + escapeHtml(path) + '"'
              : '';
          const nameStyle = t.isPlayerCorp
            ? ' style="color:var(--gold);font-weight:700"'
            : '';
          tops +=
            '<tr' +
            rowClick +
            '><td>#' +
            escapeHtml(String(t.rank)) +
            '</td><td' +
            nameStyle +
            '>' +
            escapeHtml(t.name) +
            '</td><td>' +
            fmtMoney(t.revenuePerTurn) +
            '</td></tr>';
        });
        return (
          '<div class="pip-view-grid">' +
          '<div class="pip-panel"><h3>Your corp</h3>' +
          card +
          '</div>' +
          '<div class="pip-panel"><h3>Commodities</h3>' +
          '<table class="pip-table"><thead><tr><th>Commodity</th><th>Price</th><th>24h</th></tr></thead><tbody>' +
          rows +
          '</tbody></table></div>' +
          '<div class="pip-panel"><h3>Top corps</h3>' +
          '<table class="pip-table"><thead><tr><th>#</th><th>Name</th><th>Rev</th></tr></thead><tbody>' +
          tops +
          '</tbody></table></div></div>'
        );
      }

      function renderElections(d) {
        d = d || {};
        const pr = d.playerRace;
        let race = '<p class="pip-muted">Not running in an active race.</p>';
        if (pr) {
          const ends =
            pr.phase === 'primary' && pr.primaryEndsAt
              ? pr.primaryEndsAt
              : pr.endsAt;
          const cd = formatCountdownTo(ends);
          const et = electionTypeLabel(String(pr.electionType || ''));
          const route =
            pr.electionId != null
              ? '/elections/' + encodeURIComponent(String(pr.electionId))
              : '';
          const inner =
            '<span class="pip-muted">' +
            countryFlagEmoji(pr.countryId) +
            '</span> ' +
            escapeHtml(et) +
            ' · ' +
            escapeHtml(pr.state || '') +
            '<br/>Phase: ' +
            escapeHtml(electionTypeLabel(String(pr.phase || ''))) +
            ' · Rank ' +
            escapeHtml(pr.position != null ? String(pr.position) : '?') +
            ' / ' +
            escapeHtml(String(pr.totalCandidates ?? '—')) +
            '<br/><span class="pip-muted">Ends in ' +
            escapeHtml(cd) +
            '</span>';
          race = route
            ? '<div class="pip-list pip-click" data-pip-route="' +
              escapeHtml(route) +
              '">' +
              inner +
              '</div>'
            : '<div class="pip-list">' + inner + '</div>';
        }
        let feed = '';
        (d.activeFeed || []).forEach((e) => {
          const flag = countryFlagEmoji(e.countryId);
          const et = electionTypeLabel(String(e.electionType || ''));
          const cd = formatCountdownTo(e.endsAt);
          const path =
            e.id != null
              ? '/elections/' + encodeURIComponent(String(e.id))
              : '';
          const row =
            (path
              ? '<li class="pip-feed-row pip-click" data-pip-route="' +
                escapeHtml(path) +
                '">'
              : '<li class="pip-feed-row">') +
            '<span class="pip-muted">' +
            flag +
            '</span> ' +
            escapeHtml(et) +
            ' · ' +
            escapeHtml(e.state || '') +
            '<br/><span class="pip-muted">' +
            escapeHtml(cd) +
            '</span></li>';
          feed += row;
        });
        const leg = d.legislature || {};
        const prim = legislatureSeatsHtml(leg.primary || {});
        const sec = legislatureSeatsHtml(leg.secondary || {});
        return (
          '<div class="pip-view-grid">' +
          '<div class="pip-panel"><h3>My race</h3>' +
          race +
          '</div>' +
          '<div class="pip-panel"><h3>Active elections</h3><ul class="pip-list" style="padding:0">' +
          feed +
          '</ul></div>' +
          '<div class="pip-panel"><h3>' +
          escapeHtml(leg.primaryLabel || 'Legislature') +
          '</h3><div class="pip-muted" style="font-size:9px;line-height:1.4">' +
          escapeHtml(prim) +
          '</div>' +
          (leg.secondaryLabel
            ? '<h3 style="margin-top:8px">' +
              escapeHtml(leg.secondaryLabel) +
              '</h3><div class="pip-muted" style="font-size:9px;line-height:1.4">' +
              escapeHtml(sec) +
              '</div>'
            : '') +
          '</div></div>'
        );
      }

      function renderGlobal(d) {
        d = d || {};
        const countries = d.countries || [];
        let cg = '';
        countries.forEach((c) => {
          const cid = String(c.id || '');
          const route =
            cid !== ''
              ? '/country/' + encodeURIComponent(cid.toLowerCase())
              : '';
          const seats =
            (c.dominantSeats != null ? c.dominantSeats : 0) +
            '/' +
            (c.totalSeats != null ? c.totalSeats : 0);
          const inner =
            '<div style="font-size:10px;margin-bottom:4px">' +
            '<span class="pip-muted" style="font-size:14px">' +
            countryFlagEmoji(c.id) +
            '</span> ' +
            '<strong>' +
            escapeHtml(cid) +
            '</strong></div>' +
            '<span class="pip-dot" style="background:' +
            escapeHtml(c.dominantPartyColor || '#888') +
            '"></span> ' +
            escapeHtml(
              c.dominantPartyName ||
                partyLabel(String(c.dominantParty || '')) ||
                '—',
            ) +
            '<br/><span class="pip-muted">' +
            escapeHtml(seats) +
            ' seats · ' +
            escapeHtml(String(c.activeElections ?? 0)) +
            ' races</span>';
          cg +=
            '<div class="pip-country-cell' +
            (route ? ' pip-click' : '') +
            '"' +
            (route ? ' data-pip-route="' + escapeHtml(route) + '"' : '') +
            '>' +
            inner +
            '</div>';
        });
        let cr = '';
        (d.crises || []).forEach((x) => {
          cr +=
            '<li>' +
            countryFlagEmoji(x.countryId) +
            ' ' +
            escapeHtml(x.countryId) +
            ' · ' +
            escapeHtml(crisisTypeLabel(String(x.type || ''))) +
            ' <span class="pip-muted">(' +
            escapeHtml(x.status) +
            ')</span></li>';
        });
        const t = d.turn || {};
        return (
          '<div class="pip-view-grid">' +
          '<div class="pip-panel"><h3>Countries</h3><div class="pip-country-grid">' +
          cg +
          '</div></div>' +
          '<div class="pip-panel"><h3>Crises</h3>' +
          (cr
            ? '<ul class="pip-list">' + cr + '</ul>'
            : '<p class="pip-muted">No active crises.</p>') +
          '</div>' +
          '<div class="pip-panel"><h3>Turn</h3><div class="pip-list">' +
          '<span class="pip-turn-badge">Turn ' +
          escapeHtml(String(t.currentTurn ?? '—')) +
          '</span> ' +
          '<span class="pip-muted">Year ' +
          escapeHtml(String(t.currentYear ?? '—')) +
          '</span></div></div></div>'
        );
      }

      function panelHtml(id) {
        const bundle = views.custom || {};
        const st = bundle.standard || views.standard || {};
        const el = bundle.elections || views.elections || {};
        const co = bundle.corp || views.corp || {};
        const gl = bundle.global || views.global || {};

        if (id === 'my-status') {
          return (
            '<div class="pip-list">AP ' +
            barValue('ap') +
            '<br/>Funds ' +
            barValue('funds') +
            '<br/>Mail unread ' +
            fmtStat(bar.unreadMailCount) +
            '</div>'
          );
        }
        if (id === 'portfolio-value') {
          return (
            '<div class="pip-list">Portfolio ' +
            barValue('portfolio') +
            '</div>'
          );
        }
        if (id === 'decay-stats') {
          const dec = st.decay || {};
          let h = '';
          ['pi', 'fav', 'infamy'].forEach((k) => {
            const x = dec[k];
            if (!x) return;
            h += decayBadge(k, x);
          });
          return h || '<p class="pip-muted">—</p>';
        }
        if (id === 'income-breakdown') {
          const inc = st.income || {};
          return (
            '<div class="pip-list">Net/turn ' +
            (inc.netPerTurn != null ? fmtMoney(inc.netPerTurn) : '—') +
            '</div>'
          );
        }
        if (id === 'notifications' || id === 'mail-count') {
          const n = st.notifications || {};
          if (id === 'mail-count') {
            return (
              '<div class="pip-list">Unread mail: ' +
              fmtStat(n.unreadMailCount) +
              '</div>'
            );
          }
          let r = '';
          (n.recent || []).forEach((x) => {
            r +=
              '<li class="pip-feed-row pip-click" data-pip-route="/notifications">' +
              escapeHtml(x.message || '') +
              '</li>';
          });
          return (
            '<div class="pip-muted">Unread ' +
            fmtStat(n.unreadCount) +
            '</div><ul class="pip-list">' +
            r +
            '</ul>'
          );
        }
        if (id === 'my-election') {
          const pr = el.playerRace;
          if (!pr) return '<p class="pip-muted">—</p>';
          const ends =
            pr.phase === 'primary' && pr.primaryEndsAt
              ? pr.primaryEndsAt
              : pr.endsAt;
          return (
            '<div class="pip-list">' +
            countryFlagEmoji(pr.countryId) +
            ' ' +
            escapeHtml(electionTypeLabel(String(pr.electionType || ''))) +
            ' · ' +
            escapeHtml(pr.state || '') +
            '<br/>Rank ' +
            escapeHtml(pr.position != null ? String(pr.position) : '?') +
            ' / ' +
            escapeHtml(String(pr.totalCandidates ?? '—')) +
            '<br/><span class="pip-muted">' +
            escapeHtml(formatCountdownTo(ends)) +
            '</span></div>'
          );
        }
        if (id === 'elections-feed') {
          let h = '<ul class="pip-list">';
          (el.activeFeed || []).forEach((e) => {
            h +=
              '<li>' +
              escapeHtml(electionTypeLabel(String(e.electionType || ''))) +
              ' · ' +
              escapeHtml(e.state || '') +
              '</li>';
          });
          h += '</ul>';
          return h || '<p class="pip-muted">—</p>';
        }
        if (id === 'legislature') {
          const leg = el.legislature || {};
          return (
            '<div class="pip-muted" style="font-size:9px">' +
            escapeHtml(leg.primaryLabel || '') +
            '<br/>' +
            escapeHtml(legislatureSeatsHtml(leg.primary || {})) +
            '</div>'
          );
        }
        if (id === 'my-corp') {
          const pc = co.playerCorp;
          if (!pc) return '<p class="pip-muted">—</p>';
          return (
            '<div class="pip-list"><strong>' +
            escapeHtml(pc.name || '') +
            '</strong><br/>Rev/turn ' +
            fmtMoney(pc.revenuePerTurn) +
            '</div>'
          );
        }
        if (id === 'commodities') {
          let rows = '';
          (co.commodities || []).forEach((c) => {
            rows +=
              '<tr><td>' +
              commodityIcon(c.type) +
              ' ' +
              escapeHtml(corpTypeLabel(String(c.type || ''))) +
              '</td><td>' +
              fmtMoney(c.price) +
              '</td><td>' +
              formatPctChange(c.change24h) +
              '</td></tr>';
          });
          return (
            '<table class="pip-table"><thead><tr><th>Commodity</th><th>Price</th><th>24h</th></tr></thead><tbody>' +
            rows +
            '</tbody></table>'
          );
        }
        if (id === 'top-corps') {
          let rows = '';
          (co.topCorps || []).forEach((t) => {
            const nameStyle = t.isPlayerCorp
              ? ' style="color:var(--gold);font-weight:700"'
              : '';
            rows +=
              '<tr><td>#' +
              escapeHtml(String(t.rank)) +
              '</td><td' +
              nameStyle +
              '>' +
              escapeHtml(t.name) +
              '</td><td>' +
              fmtMoney(t.revenuePerTurn) +
              '</td></tr>';
          });
          return (
            '<table class="pip-table"><thead><tr><th>#</th><th>Name</th><th>Rev</th></tr></thead><tbody>' +
            rows +
            '</tbody></table>'
          );
        }
        if (id === 'country-snapshot') {
          let cg = '';
          (gl.countries || []).forEach((c) => {
            cg +=
              '<div style="font-size:9px;margin-bottom:4px"><span class="pip-muted">' +
              countryFlagEmoji(c.id) +
              '</span> <strong>' +
              escapeHtml(c.id) +
              '</strong> ' +
              escapeHtml(
                c.dominantPartyName ||
                  partyLabel(String(c.dominantParty || '')) ||
                  '',
              ) +
              '</div>';
          });
          return cg || '<p class="pip-muted">—</p>';
        }
        if (id === 'crises') {
          let cr = '<ul class="pip-list">';
          (gl.crises || []).forEach((x) => {
            cr +=
              '<li>' +
              escapeHtml(x.countryId) +
              ' · ' +
              escapeHtml(crisisTypeLabel(String(x.type || ''))) +
              '</li>';
          });
          cr += '</ul>';
          return (gl.crises || []).length
            ? cr
            : '<p class="pip-muted">No active crises.</p>';
        }
        return '<p class="pip-muted">—</p>';
      }

      function renderCustom() {
        let html = '<div class="pip-custom-grid" id="pip-custom-grid">';
        customPanels.forEach((pid, idx) => {
          const title = PANEL_LABELS[pid] || pid;
          const body = panelHtml(pid);
          html +=
            '<div class="pip-panel pip-custom-tile' +
            (customEdit ? ' edit' : '') +
            '">';
          if (customEdit) {
            html +=
              '<span class="pip-drag" draggable="true" data-idx="' +
              idx +
              '">⠿</span>';
            html +=
              '<button type="button" class="pip-rm" data-panel="' +
              escapeHtml(pid) +
              '">×</button>';
          }
          html += '<h3>' + escapeHtml(title) + '</h3>' + body + '</div>';
        });
        if (customEdit) {
          html +=
            '<div class="pip-add-slot" id="pip-add-module">+ add module</div>';
        }
        html += '</div>';
        return html;
      }

      function removePanel(id) {
        savePanels(customPanels.filter((p) => p !== id));
      }

      function openPicker() {
        const avail = Object.keys(PANEL_LABELS).filter(
          (id) => !customPanels.includes(id),
        );
        const list = document.getElementById('pip-picker-list');
        list.innerHTML = '';
        avail.forEach((id) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'row';
          b.textContent = PANEL_LABELS[id];
          b.onclick = () => {
            savePanels(customPanels.concat([id]));
            closePicker();
          };
          list.appendChild(b);
        });
        if (avail.length === 0) {
          list.innerHTML = '<p class="pip-muted">All panels added.</p>';
        }
        document.getElementById('pip-picker').classList.add('open');
      }

      function closePicker() {
        document.getElementById('pip-picker').classList.remove('open');
      }

      async function savePanels(panels) {
        try {
          customPanels = panels;
          if (window.pipBridge) {
            await window.pipBridge.saveCustomPanels(panels);
          }
          renderBody();
        } catch (_err) {
        }
      }

      function openMain() {
        if (window.pipBridge) window.pipBridge.openMain();
      }

      async function cycleViewFromUi() {
        try {
          if (window.pipBridge) await window.pipBridge.cycleView();
        } catch (_err) {
        }
      }

      function updatePip(payload) {
        bar = payload.bar || {};
        views = payload.views || views;
        activeView = payload.activeView || 'standard';
        lastUpdate =
          typeof payload.lastUpdate === 'number' ? payload.lastUpdate : lastUpdate;
        if (Array.isArray(payload.barStats) && payload.barStats.length > 0) {
          barStats = payload.barStats;
        }
        if (
          Array.isArray(payload.customPanels) &&
          payload.customPanels.length > 0
        ) {
          customPanels = payload.customPanels;
        }
        renderBar();
        renderBody();
        renderFreshness();
      }

      document.getElementById('btn-view-cycle').onclick = cycleViewFromUi;
      document.getElementById('link-bar-config').onclick = () => {
        if (window.pipBridge) window.pipBridge.openGamePanelConfig();
      };
      document.getElementById('link-edit-custom').onclick = () => {
        customEdit = !customEdit;
        document.getElementById('link-edit-custom').textContent = customEdit
          ? 'done editing'
          : 'edit layout';
        renderBody();
      };
      document.getElementById('pip-picker-close').onclick = closePicker;
      setInterval(renderFreshness, 30000);

      document.getElementById('pip-body').addEventListener('click', (e) => {
        const el = e.target.closest('[data-pip-route]');
        if (
          !el ||
          !window.pipBridge ||
          typeof window.pipBridge.navigateTo !== 'function'
        ) {
          return;
        }
        const path = el.getAttribute('data-pip-route');
        if (!path) return;
        e.preventDefault();
        window.pipBridge.navigateTo(path);
      });

      renderBar();
      renderBody();
    </script>
  </body>
</html>
