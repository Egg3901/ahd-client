<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AHD DevTools</title>
    <style>
      :root {
        --bg: #09090d;
        --bg-card: #111118;
        --bg-elevated: #1a1a26;
        --border: #1d1d2e;
        --fg: #f0f0f4;
        --muted: #6b6b7a;
        --red: #dc2626;
        --red-dark: #991b1b;
        --blue: #1d4ed8;
        --mono: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
      }

      /* ── Accent line ── */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(-45deg, #dc2626, #1d4ed8, #dc2626, #1d4ed8);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        z-index: 100;
      }

      /* ── Tab bar ── */
      .tab-bar {
        display: flex;
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 2px 8px 0;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .tab {
        padding: 9px 16px;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        font-size: 12px;
        font-weight: 500;
        user-select: none;
        transition: color 0.1s;
      }

      .tab:hover {
        color: var(--fg);
      }

      .tab.active {
        color: var(--fg);
        border-bottom-color: var(--red);
      }

      /* ── Tab panels ── */
      .panel {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      .panel.active {
        display: flex;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-card);
        flex-shrink: 0;
      }

      .toolbar-label {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
      }

      /* ── Inputs ── */
      input[type='text'] {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        font-family: inherit;
        outline: none;
      }

      input[type='text']:focus {
        border-color: var(--red);
      }

      select {
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        font-family: inherit;
        outline: none;
        cursor: pointer;
      }

      /* ── Buttons ── */
      button {
        background: var(--bg-elevated);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: background 0.1s;
      }

      button:hover {
        background: var(--border);
      }

      button.active {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }

      button.active:hover {
        background: var(--red-dark);
        border-color: var(--red-dark);
      }

      button.danger {
        border-color: var(--red);
        color: var(--red);
      }

      button.danger:hover {
        background: rgba(220, 38, 38, 0.12);
      }

      /* ── Scrollable list ── */
      .list-area {
        flex: 1;
        overflow-y: auto;
        padding: 4px;
        min-height: 0;
      }

      /* ── Log entries (SSE + IPC) ── */
      .entry {
        display: grid;
        grid-template-columns: 72px auto 1fr auto;
        gap: 8px;
        align-items: baseline;
        padding: 5px 8px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 11px;
        cursor: pointer;
        border: 1px solid transparent;
      }

      .entry:hover {
        background: var(--bg-card);
        border-color: var(--border);
      }

      .entry.expanded {
        display: block;
        background: var(--bg-card);
        border-color: var(--border);
      }

      .entry.expanded .entry-row {
        display: grid;
        grid-template-columns: 72px auto 1fr auto;
        gap: 8px;
        align-items: baseline;
        margin-bottom: 6px;
      }

      .entry-time {
        color: var(--muted);
        white-space: nowrap;
      }

      .entry-badge {
        padding: 1px 7px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        white-space: nowrap;
        text-align: center;
        letter-spacing: 0.2px;
      }

      .entry-summary {
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .entry-dur {
        white-space: nowrap;
        text-align: right;
      }

      .dur-fast {
        color: var(--muted);
      }

      .dur-slow {
        color: #f59e0b;
      }

      .dur-very-slow {
        color: var(--red);
      }

      .dur-error {
        color: var(--red);
        font-weight: 700;
      }

      /* ── JSON tree ── */
      .json-tree {
        font-family: var(--mono);
        font-size: 11px;
        padding: 4px 8px 6px;
        line-height: 1.6;
      }

      .json-tree ul {
        list-style: none;
        padding-left: 18px;
        margin: 0;
      }

      .json-tree > ul {
        padding-left: 4px;
      }

      .json-key {
        color: #79c0ff;
      }

      .json-str {
        color: #a5d6ff;
      }

      .json-num {
        color: #f8961e;
      }

      .json-bool {
        color: #c084fc;
      }

      .json-null {
        color: var(--muted);
      }

      .json-toggle {
        cursor: pointer;
        user-select: none;
      }

      .json-toggle::before {
        content: '▾ ';
        font-size: 9px;
        color: var(--muted);
      }

      .json-toggle.collapsed::before {
        content: '▸ ';
      }

      .json-hint {
        color: var(--muted);
        font-style: italic;
        display: none;
      }

      /* ── State tab ── */
      .state-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        min-height: 0;
      }

      .state-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .state-card-header {
        padding: 8px 12px;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
      }

      .state-card-header:hover {
        color: var(--fg);
      }

      .state-card-body {
        border-top: 1px solid var(--border);
        max-height: 260px;
        overflow-y: auto;
      }

      .state-chevron {
        font-size: 10px;
        color: var(--muted);
      }

      /* ── Config tab ── */
      .config-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px;
        min-height: 0;
      }

      .config-section {
        margin-bottom: 22px;
      }

      .config-section h3 {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 8px;
      }

      .config-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 3px;
        font-family: var(--mono);
        font-size: 12px;
        gap: 12px;
      }

      .config-key {
        color: var(--muted);
        white-space: nowrap;
      }

      .config-val {
        color: var(--fg);
        word-break: break-all;
        text-align: right;
      }

      .server-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 8px;
      }

      .custom-url-row {
        display: flex;
        gap: 6px;
      }

      .custom-url-row input {
        flex: 1;
      }

      .sse-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .badge::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .badge-connected {
        background: rgba(22, 101, 52, 0.4);
        color: #86efac;
        border: 1px solid rgba(134, 239, 172, 0.2);
      }

      .badge-connected::before {
        background: #86efac;
      }

      .badge-disconnected {
        background: rgba(127, 29, 29, 0.4);
        color: #fca5a5;
        border: 1px solid rgba(252, 165, 165, 0.2);
      }

      .badge-disconnected::before {
        background: #fca5a5;
      }

      /* ── Empty state ── */
      .empty {
        color: var(--muted);
        text-align: center;
        padding: 56px 24px;
        font-style: italic;
        font-size: 12px;
      }

      /* ── Status bar ── */
      .status-bar {
        background: var(--bg-card);
        border-top: 1px solid var(--border);
        padding: 3px 12px;
        font-size: 11px;
        color: var(--muted);
        display: flex;
        gap: 18px;
        flex-shrink: 0;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }

      @keyframes gradientShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('sse')">SSE Events</div>
      <div class="tab" onclick="switchTab('state')">State</div>
      <div class="tab" onclick="switchTab('ipc')">IPC Log</div>
      <div class="tab" onclick="switchTab('config')">Config</div>
    </div>

    <!-- ── SSE Events panel ── -->
    <div id="panel-sse" class="panel active">
      <div class="toolbar">
        <input
          type="text"
          id="sse-filter"
          placeholder="Filter events…"
          oninput="onSseFilter()"
          style="flex: 1"
        />
        <select id="sse-type-select" onchange="onSseFilter()">
          <option value="">All types</option>
        </select>
        <button id="sse-autoscroll-btn" class="active" onclick="toggleAutoScroll()" title="Auto-scroll to latest">
          ↓ Auto
        </button>
        <button onclick="clearSse()">Clear</button>
        <button onclick="exportSse()">Export</button>
      </div>
      <div class="list-area" id="sse-list">
        <div class="empty">Waiting for SSE events…</div>
      </div>
    </div>

    <!-- ── State panel ── -->
    <div id="panel-state" class="panel">
      <div class="toolbar">
        <span class="toolbar-label" id="state-ts">—</span>
        <button onclick="refreshState()">Refresh now</button>
      </div>
      <div class="state-scroll">
        <div class="state-card">
          <div class="state-card-header" onclick="toggleCard('game-state')">
            Game State <span class="state-chevron" id="chev-game-state">▾</span>
          </div>
          <div class="state-card-body" id="body-game-state"></div>
        </div>
        <div class="state-card">
          <div class="state-card-header" onclick="toggleCard('preferences')">
            Preferences <span class="state-chevron" id="chev-preferences">▾</span>
          </div>
          <div class="state-card-body" id="body-preferences"></div>
        </div>
        <div class="state-card">
          <div class="state-card-header" onclick="toggleCard('action-queue')">
            Action Queue <span class="state-chevron" id="chev-action-queue">▾</span>
          </div>
          <div class="state-card-body" id="body-action-queue"></div>
        </div>
        <div class="state-card">
          <div class="state-card-header" onclick="toggleCard('cached-turn')">
            Cached Turn Data <span class="state-chevron" id="chev-cached-turn">▾</span>
          </div>
          <div class="state-card-body" id="body-cached-turn"></div>
        </div>
      </div>
    </div>

    <!-- ── IPC Log panel ── -->
    <div id="panel-ipc" class="panel">
      <div class="toolbar">
        <input
          type="text"
          id="ipc-filter"
          placeholder="Filter by channel…"
          oninput="onIpcFilter()"
          style="flex: 1"
        />
        <button onclick="clearIpc()">Clear</button>
      </div>
      <div class="list-area" id="ipc-list">
        <div class="empty">No IPC calls logged yet…</div>
      </div>
    </div>

    <!-- ── Config panel ── -->
    <div id="panel-config" class="panel">
      <div class="config-scroll">
        <div class="config-section">
          <h3>Environment</h3>
          <div id="config-env"></div>
        </div>

        <div class="config-section">
          <h3>SSE Connection</h3>
          <div class="sse-row">
            <span id="sse-badge" class="badge badge-disconnected">Disconnected</span>
            <button onclick="reconnectSse()">Reconnect</button>
          </div>
        </div>

        <div class="config-section">
          <h3>Switch Server</h3>
          <div class="server-grid">
            <button onclick="switchServer('local')">Local</button>
            <button onclick="switchServer('staging')">Staging</button>
            <button onclick="switchServer('production')">Production</button>
          </div>
          <div class="custom-url-row">
            <input type="text" id="custom-url" placeholder="Custom URL…" />
            <button onclick="switchServerCustom()">Go</button>
          </div>
        </div>

        <div class="config-section">
          <h3>Danger Zone</h3>
          <button class="danger" onclick="clearCache()">Clear Electron Store</button>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <span id="sb-sse">SSE ○</span>
      <span id="sb-events">Events: 0</span>
      <span id="sb-ipc">IPC calls: 0</span>
    </div>

    <script>
      /* ─────────────────────────────────────────────
         State
      ───────────────────────────────────────────── */
      let sseEntries = [];
      let ipcEntries = [];
      let sseFilterText = '';
      let sseTypeFilter = '';
      let ipcFilterText = '';
      let autoScroll = true;
      let currentTab = 'sse';
      let stateTimer = null;

      /* Badge colour palette — hashed from type string */
      const BADGE_PALETTE = [
        ['#dc2626', '#fff'],
        ['#1d4ed8', '#fff'],
        ['#16a34a', '#fff'],
        ['#d97706', '#fff'],
        ['#7c3aed', '#fff'],
        ['#0891b2', '#fff'],
        ['#be185d', '#fff'],
        ['#065f46', '#fff'],
        ['#9a3412', '#fff'],
        ['#1e3a5f', '#fff'],
      ];
      const typeColors = {};
      let colorIdx = 0;

      function colorForType(type) {
        if (!typeColors[type]) {
          typeColors[type] = BADGE_PALETTE[colorIdx++ % BADGE_PALETTE.length];
        }
        return typeColors[type];
      }

      /* ─────────────────────────────────────────────
         JSON Tree
      ───────────────────────────────────────────── */
      function renderJsonTree(value) {
        const div = document.createElement('div');
        div.className = 'json-tree';
        const ul = document.createElement('ul');
        if (typeof value === 'object' && value !== null) {
          const pairs = Array.isArray(value)
            ? value.map((v, i) => [i, v])
            : Object.entries(value);
          pairs.forEach(([k, v]) => ul.appendChild(makeJsonLi(v, k)));
        } else {
          ul.appendChild(makeJsonLi(value));
        }
        div.appendChild(ul);
        return div;
      }

      function makeJsonLi(value, key) {
        const li = document.createElement('li');

        if (typeof value === 'object' && value !== null) {
          const isArr = Array.isArray(value);
          const pairs = isArr
            ? value.map((v, i) => [i, v])
            : Object.entries(value);
          const open = isArr ? '[' : '{';
          const close = isArr ? ']' : '}';

          const toggle = document.createElement('span');
          toggle.className = 'json-toggle';

          if (key !== undefined) {
            const ks = document.createElement('span');
            ks.className = 'json-key';
            ks.textContent = JSON.stringify(String(key));
            toggle.appendChild(ks);
            toggle.appendChild(document.createTextNode(': '));
          }
          toggle.appendChild(document.createTextNode(open));

          const hint = document.createElement('span');
          hint.className = 'json-hint';
          hint.textContent = ` …${pairs.length} items `;

          const childUl = document.createElement('ul');
          pairs.forEach(([k, v]) => childUl.appendChild(makeJsonLi(v, k)));

          toggle.onclick = (e) => {
            e.stopPropagation();
            const collapsed = toggle.classList.toggle('collapsed');
            childUl.style.display = collapsed ? 'none' : '';
            hint.style.display = collapsed ? '' : 'none';
          };

          li.appendChild(toggle);
          li.appendChild(hint);
          li.appendChild(childUl);
          li.appendChild(document.createTextNode(close));
        } else {
          if (key !== undefined) {
            const ks = document.createElement('span');
            ks.className = 'json-key';
            ks.textContent = JSON.stringify(String(key));
            li.appendChild(ks);
            li.appendChild(document.createTextNode(': '));
          }
          const vs = document.createElement('span');
          if (typeof value === 'string') {
            vs.className = 'json-str';
            vs.textContent = JSON.stringify(value);
          } else if (typeof value === 'number') {
            vs.className = 'json-num';
            vs.textContent = String(value);
          } else if (typeof value === 'boolean') {
            vs.className = 'json-bool';
            vs.textContent = String(value);
          } else {
            vs.className = 'json-null';
            vs.textContent = 'null';
          }
          li.appendChild(vs);
        }
        return li;
      }

      /* ─────────────────────────────────────────────
         Tabs
      ───────────────────────────────────────────── */
      const TAB_ORDER = ['sse', 'state', 'ipc', 'config'];

      function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((el, i) => {
          el.classList.toggle('active', TAB_ORDER[i] === tab);
        });
        document.querySelectorAll('.panel').forEach((el) => {
          el.classList.remove('active');
        });
        document.getElementById('panel-' + tab).classList.add('active');
        currentTab = tab;

        if (tab === 'state') {
          refreshState();
          stateTimer = setInterval(refreshState, 1000);
        } else {
          clearInterval(stateTimer);
          stateTimer = null;
        }

        if (tab === 'config') refreshConfig();
      }

      /* ─────────────────────────────────────────────
         SSE Events
      ───────────────────────────────────────────── */
      function onSseEvent(entry) {
        sseEntries.push(entry);
        addTypeOption(entry.type);
        if (matchesSse(entry)) {
          appendSseRow(entry);
        }
        updateStatusBar();
      }

      function addTypeOption(type) {
        const sel = document.getElementById('sse-type-select');
        for (const opt of sel.options) if (opt.value === type) return;
        const opt = document.createElement('option');
        opt.value = type;
        opt.textContent = type;
        sel.appendChild(opt);
      }

      function matchesSse(entry) {
        if (sseTypeFilter && entry.type !== sseTypeFilter) return false;
        if (!sseFilterText) return true;
        const t = sseFilterText.toLowerCase();
        return (
          entry.type.toLowerCase().includes(t) ||
          JSON.stringify(entry.data).toLowerCase().includes(t)
        );
      }

      function appendSseRow(entry) {
        const list = document.getElementById('sse-list');
        const empty = list.querySelector('.empty');
        if (empty) empty.remove();

        const [bg, fg] = colorForType(entry.type);
        const row = document.createElement('div');
        row.className = 'entry';
        row.dataset.expanded = '0';

        const rowInner = document.createElement('div');
        rowInner.className = 'entry-row';
        rowInner.innerHTML = `
          <span class="entry-time">${fmtTime(entry.timestamp)}</span>
          <span class="entry-badge" style="background:${bg};color:${fg}">${entry.type}</span>
          <span class="entry-summary">${summarize(entry.data)}</span>
          <span class="entry-dur" style="color:var(--muted)"></span>
        `;
        row.appendChild(rowInner);

        row.onclick = () => {
          if (row.dataset.expanded === '1') {
            // Collapse
            const tree = row.querySelector('.json-tree');
            if (tree) tree.remove();
            row.classList.remove('expanded');
            row.dataset.expanded = '0';
          } else {
            // Expand
            row.classList.add('expanded');
            row.dataset.expanded = '1';
            row.appendChild(renderJsonTree(entry.data ?? null));
          }
        };

        list.appendChild(row);
        if (autoScroll) list.scrollTop = list.scrollHeight;
      }

      function onSseFilter() {
        sseFilterText = document.getElementById('sse-filter').value;
        sseTypeFilter = document.getElementById('sse-type-select').value;
        rebuildSseList();
      }

      function rebuildSseList() {
        const list = document.getElementById('sse-list');
        list.innerHTML = '';
        const filtered = sseEntries.filter(matchesSse);
        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty">No matching events</div>';
          return;
        }
        filtered.forEach(appendSseRow);
      }

      function clearSse() {
        sseEntries = [];
        document.getElementById('sse-list').innerHTML =
          '<div class="empty">Waiting for SSE events…</div>';
        const sel = document.getElementById('sse-type-select');
        sel.innerHTML = '<option value="">All types</option>';
        updateStatusBar();
      }

      function exportSse() {
        const blob = new Blob([JSON.stringify(sseEntries, null, 2)], {
          type: 'application/json',
        });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `sse-events-${Date.now()}.json`;
        a.click();
      }

      function toggleAutoScroll() {
        autoScroll = !autoScroll;
        const btn = document.getElementById('sse-autoscroll-btn');
        btn.classList.toggle('active', autoScroll);
      }

      /* ─────────────────────────────────────────────
         State
      ───────────────────────────────────────────── */
      async function refreshState() {
        try {
          const s = await devTools.getState();
          renderCard('game-state', s.gameState ?? {});
          renderCard('preferences', s.preferences ?? {});
          const q = s.actionQueue ?? [];
          const qLabel = q.length ? `(${q.length}) ▾` : '▾';
          document.getElementById('chev-action-queue').textContent = qLabel;
          renderCard('action-queue', q);
          renderCard('cached-turn', s.cachedTurn ?? {});
          document.getElementById('state-ts').textContent =
            `Last updated: ${new Date().toLocaleTimeString()}`;
        } catch (_) {
          /* ignore */
        }
      }

      function renderCard(id, data) {
        const body = document.getElementById('body-' + id);
        body.innerHTML = '';
        body.appendChild(renderJsonTree(data));
      }

      function toggleCard(id) {
        const body = document.getElementById('body-' + id);
        const chev = document.getElementById('chev-' + id);
        const hidden = body.style.display === 'none';
        body.style.display = hidden ? '' : 'none';
        if (chev && !chev.textContent.includes('(')) {
          chev.textContent = hidden ? '▾' : '▸';
        }
      }

      /* ─────────────────────────────────────────────
         IPC Log
      ───────────────────────────────────────────── */
      function onIpcCall(entry) {
        ipcEntries.push(entry);
        if (!ipcFilterText || entry.channel.toLowerCase().includes(ipcFilterText.toLowerCase())) {
          appendIpcRow(entry);
        }
        updateStatusBar();
      }

      function appendIpcRow(entry) {
        const list = document.getElementById('ipc-list');
        const empty = list.querySelector('.empty');
        if (empty) empty.remove();

        const dur = entry.durationMs;
        const durClass = entry.error
          ? 'dur-error'
          : dur >= 100
            ? 'dur-very-slow'
            : dur >= 10
              ? 'dur-slow'
              : 'dur-fast';
        const durText = entry.error ? 'ERR' : `${dur}ms`;

        const row = document.createElement('div');
        row.className = 'entry';
        row.dataset.expanded = '0';

        const rowInner = document.createElement('div');
        rowInner.className = 'entry-row';
        rowInner.innerHTML = `
          <span class="entry-time">${fmtTime(entry.timestamp)}</span>
          <span class="entry-badge" style="background:var(--bg-elevated);color:var(--fg);border:1px solid var(--border)">${entry.channel}</span>
          <span class="entry-summary">${entry.args != null ? JSON.stringify(entry.args).slice(0, 80) : '—'}</span>
          <span class="entry-dur ${durClass}">${durText}</span>
        `;
        row.appendChild(rowInner);

        row.onclick = () => {
          if (row.dataset.expanded === '1') {
            const tree = row.querySelector('.json-tree');
            if (tree) tree.remove();
            row.classList.remove('expanded');
            row.dataset.expanded = '0';
          } else {
            row.classList.add('expanded');
            row.dataset.expanded = '1';
            row.appendChild(
              renderJsonTree({
                args: entry.args ?? null,
                result: entry.result ?? null,
                error: entry.error ?? null,
                durationMs: entry.durationMs,
              }),
            );
          }
        };

        list.appendChild(row);
        list.scrollTop = list.scrollHeight;
      }

      function onIpcFilter() {
        ipcFilterText = document.getElementById('ipc-filter').value;
        const list = document.getElementById('ipc-list');
        list.innerHTML = '';
        const filtered = ipcEntries.filter(
          (e) =>
            !ipcFilterText ||
            e.channel.toLowerCase().includes(ipcFilterText.toLowerCase()),
        );
        if (filtered.length === 0) {
          list.innerHTML = '<div class="empty">No matching IPC calls</div>';
          return;
        }
        filtered.forEach(appendIpcRow);
      }

      function clearIpc() {
        ipcEntries = [];
        document.getElementById('ipc-list').innerHTML =
          '<div class="empty">No IPC calls logged yet…</div>';
        updateStatusBar();
      }

      /* ─────────────────────────────────────────────
         Config
      ───────────────────────────────────────────── */
      async function refreshConfig() {
        try {
          const cfg = await devTools.getConfig();
          renderConfigEnv(cfg);
          updateSseBadge(cfg.sse?.connected);
          document.getElementById('sb-events').textContent =
            `Events: ${cfg.sse?.eventCount ?? sseEntries.length}`;
        } catch (_) {
          /* ignore */
        }
      }

      function renderConfigEnv(cfg) {
        const el = document.getElementById('config-env');
        el.innerHTML = '';
        const rows = [
          ['NODE_ENV', cfg.NODE_ENV],
          ['GAME_URL', cfg.GAME_URL],
          ['Electron', cfg.electronVersion],
          ['Node', cfg.nodeVersion],
          ['Platform', cfg.platform],
          ['Window', `${cfg.WINDOW_WIDTH} × ${cfg.WINDOW_HEIGHT}`],
        ];
        rows.forEach(([k, v]) => {
          const div = document.createElement('div');
          div.className = 'config-row';
          div.innerHTML = `<span class="config-key">${k}</span><span class="config-val">${v ?? '—'}</span>`;
          el.appendChild(div);
        });
      }

      function updateSseBadge(connected) {
        const badge = document.getElementById('sse-badge');
        badge.textContent = connected ? 'Connected' : 'Disconnected';
        badge.className = 'badge ' + (connected ? 'badge-connected' : 'badge-disconnected');
        document.getElementById('sb-sse').textContent =
          `SSE ${connected ? '●' : '○'}`;
      }

      // Poll SSE status while on config tab
      setInterval(async () => {
        if (currentTab !== 'config') return;
        try {
          const cfg = await devTools.getConfig();
          updateSseBadge(cfg.sse?.connected);
        } catch (_) {}
      }, 2000);

      async function switchServer(preset) {
        await devTools.switchServer(preset);
      }

      async function switchServerCustom() {
        const url = document.getElementById('custom-url').value.trim();
        if (url) await devTools.switchServer(url);
      }

      async function reconnectSse() {
        await devTools.reconnectSse();
      }

      async function clearCache() {
        if (
          confirm(
            'Clear the Electron Store?\n\nThis resets all cached game state, preferences, and queued actions.',
          )
        ) {
          await devTools.clearCache();
        }
      }

      /* ─────────────────────────────────────────────
         Status bar
      ───────────────────────────────────────────── */
      function updateStatusBar() {
        document.getElementById('sb-events').textContent =
          `Events: ${sseEntries.length}`;
        document.getElementById('sb-ipc').textContent =
          `IPC calls: ${ipcEntries.length}`;
      }

      /* ─────────────────────────────────────────────
         Utilities
      ───────────────────────────────────────────── */
      function fmtTime(iso) {
        return new Date(iso).toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        });
      }

      function summarize(data) {
        if (data == null) return 'null';
        if (typeof data !== 'object') return String(data).slice(0, 80);
        const keys = Object.keys(data);
        if (keys.length === 0) return Array.isArray(data) ? '[]' : '{}';
        const preview = keys.slice(0, 4).join(', ');
        return `{ ${preview}${keys.length > 4 ? ', …' : ''} }`;
      }

      /* ─────────────────────────────────────────────
         Push event listeners
      ───────────────────────────────────────────── */
      devTools.on('dev-sse-event', onSseEvent);
      devTools.on('dev-ipc-call', onIpcCall);
    </script>
  </body>
</html>
