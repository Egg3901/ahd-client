<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Game panel shortcuts</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 14px 16px 16px;
        font:
          13px/1.4 'Segoe UI',
          system-ui,
          sans-serif;
        color: #e8e8f0;
        background: linear-gradient(165deg, #222238 0%, #12121f 100%);
        min-height: 100vh;
      }
      h1 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: #c9a959;
        margin: 0 0 12px;
        font-weight: 600;
      }
      p.hint {
        font-size: 11px;
        color: #8b8bb8;
        margin: 0 0 14px;
        max-width: 52ch;
      }
      .section-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #8b8bb8;
        margin: 14px 0 8px;
        font-weight: 600;
      }
      .presets {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.2);
      }
      .presets label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        cursor: pointer;
        user-select: none;
      }
      .presets input {
        accent-color: #c9a959;
      }
      .custom-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .custom-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 6px;
        align-items: center;
      }
      .custom-row input {
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.25);
        color: #e8e8f0;
        font-size: 12px;
      }
      .btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: #c9a959;
        font-size: 12px;
        cursor: pointer;
      }
      .btn:hover {
        background: rgba(201, 169, 89, 0.15);
      }
      .btn-danger {
        color: #f05a5a;
        padding: 4px 8px;
        font-size: 11px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
        flex-wrap: wrap;
      }
      .actions .btn-primary {
        background: rgba(201, 169, 89, 0.2);
        border-color: rgba(201, 169, 89, 0.35);
        font-weight: 600;
      }
      .err {
        color: #f05a5a;
        font-size: 11px;
        margin-top: 8px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <h1>Game panel shortcuts</h1>
    <p class="hint">
      Choose which links appear under the Game menu before Reload / Go Home. The
      corporation shortcut is on by default: it opens
      <strong>CEO</strong> when you are a CEO, or
      <strong>Create a corporation</strong> otherwise.
    </p>

    <div class="section-title">Built-in pages</div>
    <div class="presets" id="presets"></div>

    <div class="section-title">Custom links</div>
    <div class="custom-list" id="custom-list"></div>
    <button type="button" class="btn" id="add-custom">+ Add custom link</button>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="save">Save</button>
      <button type="button" class="btn" id="reset">Reset to defaults</button>
      <button type="button" class="btn" id="cancel">Cancel</button>
    </div>
    <div class="err" id="err"></div>

    <script>
      const presetsEl = document.getElementById('presets');
      const customListEl = document.getElementById('custom-list');
      const errEl = document.getElementById('err');

      let catalog = [];
      /** @type {Set<string>} */
      let enabledPresets = new Set();
      /** @type {{ label: string, path: string }[]} */
      let customRows = [];

      function entriesFromState() {
        const out = [];
        for (const p of catalog) {
          if (enabledPresets.has(p.id)) {
            out.push({ kind: 'preset', id: p.id });
          }
        }
        for (const c of customRows) {
          out.push({
            kind: 'custom',
            label: c.label.trim(),
            path: c.path.trim(),
          });
        }
        return out;
      }

      function hydrateFromEntries(entries) {
        enabledPresets = new Set();
        customRows = [];
        for (const e of entries) {
          if (e.kind === 'preset') enabledPresets.add(e.id);
          if (e.kind === 'custom') {
            customRows.push({ label: e.label || '', path: e.path || '' });
          }
        }
      }

      function renderPresets() {
        presetsEl.innerHTML = '';
        for (const p of catalog) {
          const lab = document.createElement('label');
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = enabledPresets.has(p.id);
          cb.addEventListener('change', () => {
            if (cb.checked) enabledPresets.add(p.id);
            else enabledPresets.delete(p.id);
          });
          lab.appendChild(cb);
          lab.appendChild(document.createTextNode(p.label));
          presetsEl.appendChild(lab);
        }
      }

      function renderCustom() {
        customListEl.innerHTML = '';
        customRows.forEach((row, idx) => {
          const wrap = document.createElement('div');
          wrap.className = 'custom-row';
          const inLabel = document.createElement('input');
          inLabel.type = 'text';
          inLabel.placeholder = 'Label';
          inLabel.value = row.label;
          inLabel.addEventListener('input', () => {
            customRows[idx].label = inLabel.value;
          });
          const inPath = document.createElement('input');
          inPath.type = 'text';
          inPath.placeholder = '/wiki';
          inPath.value = row.path;
          inPath.addEventListener('input', () => {
            customRows[idx].path = inPath.value;
          });
          const rm = document.createElement('button');
          rm.type = 'button';
          rm.className = 'btn btn-danger';
          rm.textContent = 'Remove';
          rm.addEventListener('click', () => {
            customRows.splice(idx, 1);
            renderCustom();
          });
          wrap.appendChild(inLabel);
          wrap.appendChild(inPath);
          wrap.appendChild(rm);
          customListEl.appendChild(wrap);
        });
      }

      document.getElementById('add-custom').addEventListener('click', () => {
        customRows.push({ label: '', path: '' });
        renderCustom();
      });

      async function load() {
        errEl.textContent = '';
        const data = await window.gamePanelConfig.getConfig();
        catalog = data.catalog || [];
        const stored = data.stored;
        const defs = data.defaults || [];
        const source =
          stored != null ? stored : JSON.parse(JSON.stringify(defs));
        hydrateFromEntries(source);
        renderPresets();
        renderCustom();
      }

      document.getElementById('save').addEventListener('click', async () => {
        errEl.textContent = '';
        const payload = entriesFromState();
        const res = await window.gamePanelConfig.save(payload);
        if (res && res.ok) {
          window.close();
        } else {
          errEl.textContent = (res && res.error) || 'Could not save.';
        }
      });

      document.getElementById('reset').addEventListener('click', async () => {
        errEl.textContent = '';
        const res = await window.gamePanelConfig.reset();
        if (res && res.ok) {
          await load();
        } else {
          errEl.textContent = (res && res.error) || 'Could not reset.';
        }
      });

      document.getElementById('cancel').addEventListener('click', () => {
        window.close();
      });

      load();
    </script>
  </body>
</html>
